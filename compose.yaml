# Docker Compose configuration for Urban Housing Demand application
# Use: docker compose up -d

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - DB_ADDRESS=jdbc:mysql://database:3306
      - DB_DATABASE=${DB_DATABASE:-template_db}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-pwd}
    networks:
      - backend-database
      - backend-frontend
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  database:
    build: ./database
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-pwd}
      - MYSQL_DATABASE=${DB_DATABASE:-template_db}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - backend-database
      - ingester-database
    ports:
      - "3306:3306"
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-pwd}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_PROXY=http://backend:8080
    networks:
      - backend-frontend
    depends_on:
      - backend
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  ingestor:
    build: ./ingestor
    environment:
      - DB_HOST=database
      - DB_DATABASE=${DB_DATABASE:-template_db}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-pwd}
    depends_on:
      database:
        condition: service_healthy
    networks:
      - ingester-database
    # Ingestor runs once and exits - no restart needed
    restart: "no"

volumes:
  mariadb_data:
    name: urban_housing_demand_data

networks:
  backend-database:
  backend-frontend:
  ingester-database:
