version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      routine-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: gradle
    directory: /backend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      routine-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: pip
    directory: /ingestor
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      routine-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      routine-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
