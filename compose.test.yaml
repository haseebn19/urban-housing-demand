# Docker Compose for running all tests
# Usage: docker compose -f compose.test.yaml up --build

services:
  test-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.test
    environment:
      - CI=true

  test-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    environment:
      - DDL_AUTO=create-drop

  test-ingestor:
    build:
      context: ./ingestor
      dockerfile: Dockerfile.test
    environment:
      - DB_PASSWORD=test_password
